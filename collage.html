<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Collage</title>
    <style>
        :root {
            --bg-color: #a30000;
            --text-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 90vw;
            max-width: 600px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Moved container content upwards */
            padding-top: 0; 
            margin-top: -50px;
        }

        /* Typewriter Effect Styles */
        .typewriter-container {
            height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--text-white);
            font-size: 2.5rem;
            margin: 0;
            text-align: center;
            overflow: hidden; 
            border-right: .15em solid orange; 
            white-space: nowrap; 
            letter-spacing: .05em; 
            animation: 
                typing 3.5s steps(30, end),
                blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: white; }
        }

        .collage-area {
            position: relative;
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo {
            position: absolute;
            border: 8px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            background-color: #ddd;
            object-fit: cover;
        }

        /* 1st Image (Back) */
        .img-bottom {
            width: 65%;
            z-index: 1;
            transform: rotate(-12deg) translate(-30px, -20px);
        }

        /* 2nd Image (Middle) */
        .img-middle {
            width: 70%;
            z-index: 2;
            transform: rotate(8deg) translate(20px, 10px);
        }

        /* 3rd Image (Front/Prominent) */
        .img-top {
            width: 75%;
            z-index: 3;
            transform: rotate(0deg);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .decoration {
            position: absolute;
            z-index: 10;
        }

        .star { width: 80px; }
        .star-1 { top: 10%; right: 5%; transform: rotate(15deg); }
        .star-2 { top: 25%; right: 2%; transform: rotate(-10deg); }

        .cat {
            width: 150px;
            bottom: -40px;
            right: 3%;
        }

        .note {
            position: absolute;
            top: 20px;
            left: 0;
            background: #fff;
            padding: 10px;
            width: 110px;
            font-size: 0.8rem;
            transform: rotate(-15deg);
            z-index: 11;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* Bottom Right Button */
        .back-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #000000;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
            z-index: 100;
        }

        .back-btn:hover {
            transform: scale(1.05);
            background-color: #333333;
        }

@media (max-width: 480px) {
    h1 { 
        font-size: 1.3rem; /* Reduced size to fit mobile screens */
        letter-spacing: .02em; 
    }
    .typewriter-container {
        width: 100%; /* Ensures the container doesn't exceed screen width */
        height: auto;
        margin-bottom: 10px;
    }
    .collage-area { height: 250px; }
    .img-top { width: 85%; }
    .cat { width: 50px; }
}
    </style>
</head>
<body>

    <div class="container">
        <div class="typewriter-container">
            <h1 id="typewriter">Happy birthday my love</h1>
        </div>

        <div class="collage-area">
            <!-- 1st Image (Back) -->
            <img src="1.jpg" alt="Photo 1" class="photo img-bottom">

            <!-- 2nd Image (Middle) -->
            <img src="3.jpg" alt="Photo 2" class="photo img-middle">

            <!-- 3rd Image (Front/Prominent) -->
            <img src="1.jpg" alt="Photo 3" class="photo img-top">

            <div class="note">
                Till Infinty...
            </div>

            <img src="star.png" alt="star" class="decoration star star-1">
            <img src="star.png" alt="star" class="decoration star star-2">
            <img src="cat.png" alt="cat" class="decoration cat">
        </div>
    </div>

    <!-- Replace 'https://www.google.com' with your actual destination URL -->
    <a href="Giftboxpage.html" class="back-btn">Back</a>

    <script>
        // Restarts the animation every time the page loads
        window.onload = function() {
            const el = document.getElementById('typewriter');
            el.style.animation = 'none';
            el.offsetHeight; /* trigger reflow */
            el.style.animation = null; 
        };
    </script>
</body>
</html>
