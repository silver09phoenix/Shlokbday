<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Choose a Gift</title>

  <!-- Cute Font -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#f5f5f5;
      font-family:'Baloo 2', cursive;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* MAIN CONTAINER */

    .main-container{
      width:100vw;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      position:relative;
      background:#f5f5f5;
    }

    /* TITLE */

    .title{
      font-size:clamp(38px, 5vw, 72px);
      color:#e86b94;
      font-weight:700;
      letter-spacing:1px;
      margin-bottom:7vh;
      text-align:center;

      text-shadow:
        0 2px 0 #ffffff,
        0 4px 10px rgba(232,107,148,0.25);
    }

    /* GIF SECTION */

    .gift-wrapper{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:min(5vw, 80px);
      padding:0 4vw;
      flex-wrap:nowrap;
    }

    /* CLICKABLE GIFS */

    .gift-box{
      width:min(22vw, 240px);
      aspect-ratio:1/1;

      display:flex;
      justify-content:center;
      align-items:center;

      text-decoration:none;

      cursor:pointer;
      transition:transform .25s ease;

      user-select:none;
    }

    .gift-box:hover{
      transform:translateY(-8px) scale(1.03);
    }

    .gift-box img{
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
    }

    /* BOTTOM TEXT */

    .bottom-text{
      position:absolute;
      bottom:10vh;

      font-size:clamp(24px, 3vw, 46px);

      color:#d96d92;
      font-weight:600;
      letter-spacing:1px;

      text-shadow:
        0 2px 0 #ffffff,
        0 4px 10px rgba(232,107,148,0.2);
    }

    /* HEART ICON */

    .heart{
      position:absolute;
      right:20px;
      bottom:18px;

      width:55px;
      height:55px;

      opacity:0.85;

      filter:drop-shadow(0 0 8px rgba(0,0,0,0.15));
    }

    .heart svg{
      width:100%;
      height:100%;
    }

    /* RESPONSIVE DESIGN */

    @media (max-width:768px){

      .gift-wrapper{
        gap:3vw;
      }

      .gift-box{
        width:28vw;
      }

      .bottom-text{
        bottom:12vh;
      }
    }

    @media (max-width:480px){

      .title{
        margin-bottom:6vh;
      }

      .gift-box{
        width:29vw;
      }

      .bottom-text{
        bottom:11vh;
      }

      .heart{
        width:48px;
        height:48px;
      }
    }

  </style>
</head>

<body>

  <div class="main-container">

    <!-- TITLE -->
    <h1 class="title">Gift for you</h1>

    <!-- GIFT GIFS -->

    <div class="gift-wrapper">

      <!-- GIFT 1 -->
      <a href="cake.html" class="gift-box">
        <img src="Giftbox.gif" alt="Gift Box 1">
      </a>

      <!-- GIFT 2 -->
      <a href="collage.html" class="gift-box">
        <img src="Giftbox.gif" alt="Gift Box 2">
      </a>

      <!-- GIFT 3 -->
      <a href="Final.html" class="gift-box">
        <img src="Giftbox.gif" alt="Gift Box 3">
      </a>

    </div>

    <!-- BOTTOM TEXT -->

    <div class="bottom-text">
      click any gift to open
    </div>

    <!-- HEART ICON -->

    <div class="heart">

      <svg viewBox="0 0 24 24" fill="none" stroke="#d9d9d9" stroke-width="1.8">

        <path d="M12 21s-6.716-4.35-9.428-8.17C-0.353 8.8 1.377 4 5.734 4c2.01 0 3.394 1.17 4.266 2.39C10.872 5.17 12.256 4 14.266 4c4.357 0 6.087 4.8 3.162 8.83C18.716 16.65 12 21 12 21z"/>

      </svg>

    </div>

  </div>

</body>
</html>
